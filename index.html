<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IGRIS</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #000;
}

/* 🔥 APP UI BACKGROUND (FAKE INTERFACE) */
.app-bg {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 0;

  background: linear-gradient(135deg, #0f172a, #020617);
  opacity: 0.35;

  display: flex;
  flex-direction: column;
  padding: 40px;
  gap: 20px;

  filter: blur(6px);
}

/* FAKE CARDS (APP UI) */
.card {
  height: 80px;
  border-radius: 15px;
  background: linear-gradient(45deg, #0ea5e9, #1e293b);
  opacity: 0.4;
}

.card.small { width: 40%; }
.card.medium { width: 60%; }
.card.large { width: 80%; }

/* OVERLAY DARK BLEND */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 1;
}

/* MAIN LAYOUT */
.container {
  display: flex;
  height: 100vh;
  align-items: center;
  justify-content: space-between;
  position: relative;
  z-index: 2;
  padding: 0 40px;
}

/* CHARACTER */
.character {
  position: relative;
  width: 32%;
}

.character img {
  width: 100%;
  z-index: 3;
  position: relative;
}

/* 🔵 BLUE AURA */
.blue::before {
  content: "";
  position: absolute;
  inset: -40px;
  background: radial-gradient(circle, rgba(0,198,255,0.6), transparent 60%);
  filter: blur(50px);
  animation: auraUp 2.5s linear infinite;
}

/* 🔴 RED AURA */
.red::before {
  content: "";
  position: absolute;
  inset: -40px;
  background: radial-gradient(circle, rgba(255,0,0,0.6), transparent 60%);
  filter: blur(50px);
  animation: auraDown 2.5s linear infinite;
}

/* AURA MOTION */
@keyframes auraUp {
  0% { transform: translateY(0); }
  100% { transform: translateY(-25px); }
}

@keyframes auraDown {
  0% { transform: translateY(0); }
  100% { transform: translateY(25px); }
}

/* PARTICLES */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.blue-particle {
  background: #00ccff;
  box-shadow: 0 0 10px #00ccff;
  animation: floatUp 3s linear infinite;
}

.red-particle {
  background: red;
  box-shadow: 0 0 10px red;
  animation: floatDown 3s linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-200px); opacity: 0; }
}

@keyframes floatDown {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(200px); opacity: 0; }
}

/* CENTER TEXT */
.center {
  text-align: center;
  color: white;
}

.center h1 {
  font-size: 80px;
  text-shadow: 0 0 25px cyan;
}

.center p {
  margin: 20px 0;
  color: #ccc;
}

/* BUTTON */
button {
  padding: 15px 40px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(to right, #00c6ff, #0072ff);
  color: white;
  cursor: pointer;
  box-shadow: 0 0 20px #00c6ff;
}

</style>
</head>

<body>

<!-- 🔥 APP UI BACKGROUND -->
<div class="app-bg">
  <div class="card large"></div>
  <div class="card medium"></div>
  <div class="card small"></div>
  <div class="card large"></div>
  <div class="card medium"></div>
</div>

<div class="overlay"></div>

<div class="container">

  <!-- BLUE -->
  <div class="character blue">
    <img src="blue.png">

    <div class="particle blue-particle" style="left:40%; bottom:20%;"></div>
    <div class="particle blue-particle" style="left:60%; bottom:30%;"></div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <h1>IGRIS</h1>
    <p>Arise. Become the best version of yourself.</p>
    <button>Download APK</button>
  </div>

  <!-- RED -->
  <div class="character red">
    <img src="red.png">

    <div class="particle red-particle" style="left:50%; top:20%;"></div>
    <div class="particle red-particle" style="left:70%; top:30%;"></div>
  </div>

</div>

</body>
</html>
