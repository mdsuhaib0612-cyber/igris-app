<!DOCTYPE html>
<html>
<head>
<title>IGRIS</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

.container {
  padding: 50px 20px;
}

h1 {
  font-size: 50px;
  letter-spacing: 3px;
}

p {
  font-size: 18px;
  opacity: 0.8;
}

.btn {
  margin-top: 20px;
  padding: 15px 30px;
  border: none;
  background: #00c6ff;
  color: black;
  font-size: 16px;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #0072ff;
  color: white;
}

.section {
  margin-top: 60px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  margin: 15px;
  border-radius: 15px;
  display: inline-block;
  width: 250px;
}
</style>
</head>

<body>

<div class="container">
  <h1>IGRIS</h1>
  <p>Arise, become the best version of yourself.</p>

  <button class="btn">Download APK</button>
</div>

<div class="section">
  <h2>⚔ Features</h2>

  <div class="card">XP Leveling System</div>
  <div class="card">Workout Quests</div>
  <div class="card">AI Coach</div>
  <div class="card">Water Tracker</div>
</div>

<div class="section">
  <h2>🔥 Become Stronger Everyday</h2>
  <p>Closer than yesterday. Stronger than before.</p>
</div>

</body>
</html>
