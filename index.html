<!DOCTYPE html>
<html>
<head>
<title>IGRIS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  overflow: hidden;

  /* BACKGROUND IMAGE */
  background: url('bg.jpg') no-repeat center center/cover;
}

/* DARK OVERLAY */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
}

/* CENTER CONTENT */
.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: black;
}

/* TITLE */
h1 {
  font-size: 80px;
  letter-spacing: 6px;
  text-shadow: 0 0 40px rgba(0,150,255,0.9);
}

/* TEXT */
p {
  font-size: 22px;
  margin-top: 10px;
  opacity: 0.9;
}

/* BUTTON */
.btn {
  margin-top: 30px;
  padding: 18px 40px;
  font-size: 18px;
  border-radius: 40px;
  border: none;
  cursor: pointer;

  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;

  box-shadow: 0 0 30px #00c6ff;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 50px #00c6ff;
}

/* ROCK BASE */
.rocks span {
  position: absolute;
  width: 20px;
  height: 20px;
  background: #444;
  border-radius: 30% 70% 60% 40%;
  filter: blur(1px);
}

/* BLUE ROCKS */
.blue-rocks span {
  background: #2a2a2a;
  box-shadow: 0 0 20px rgba(0,150,255,0.8);
}

/* RED ROCKS */
.red-rocks span {
  background: #2a2a2a;
  box-shadow: 0 0 20px rgba(255,0,0,0.8);
}

/* BLUE POSITIONS */
.blue-rocks span:nth-child(1) {
  left: 15%;
  bottom: 20%;
  animation: floatUp 4s infinite ease-in-out;
}
.blue-rocks span:nth-child(2) {
  left: 10%;
  bottom: 40%;
  animation: floatUp 5s infinite ease-in-out;
}
.blue-rocks span:nth-child(3) {
  left: 20%;
  bottom: 10%;
  animation: floatUp 6s infinite ease-in-out;
}

/* RED POSITIONS */
.red-rocks span:nth-child(1) {
  right: 15%;
  bottom: 20%;
  animation: floatDown 4s infinite ease-in-out;
}
.red-rocks span:nth-child(2) {
  right: 10%;
  bottom: 40%;
  animation: floatDown 5s infinite ease-in-out;
}
.red-rocks span:nth-child(3) {
  right: 20%;
  bottom: 10%;
  animation: floatDown 6s infinite ease-in-out;
}

/* FLOAT UP (POWER) */
@keyframes floatUp {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-40px); }
  100% { transform: translateY(0px); }
}

/* FLOAT DOWN (PRESSURE) */
@keyframes floatDown {
  0% { transform: translateY(0px); }
  50% { transform: translateY(30px); }
  100% { transform: translateY(0px); }
}
</style>

</head>

<body>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- FLOATING ROCKS -->
<div class="rocks blue-rocks">
  <span></span><span></span><span></span>
</div>

<div class="rocks red-rocks">
  <span></span><span></span><span></span>
</div>

<!-- CENTER UI -->
<div class="content">
  <h1>IGRIS</h1>
  <p>Arise, become the best version of yourself.</p>
  <button class="btn">Download APK</button>
</div>

</body>
</html>
