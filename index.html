<!DOCTYPE html>
<html>
<head>
<title>IGRIS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #0a0f1c, #000000);
  color: white;
}

.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100vh;
  padding: 0 50px;
}

.character {
  width: 300px;
  opacity: 0.9;
}

.center {
  text-align: center;
}

h1 {
  font-size: 60px;
  letter-spacing: 3px;
}

p {
  font-size: 18px;
  opacity: 0.8;
}

.btn {
  margin-top: 20px;
  padding: 15px 30px;
  border: none;
  background: #00c6ff;
  color: black;
  font-size: 16px;
  border-radius: 25px;
  cursor: pointer;
}

.btn:hover {
  background: #0072ff;
  color: white;
}
</style>

</head>

<body>

<div class="hero">

  <!-- LEFT CHARACTER -->
  <img class="character" src="https://via.placeholder.com/300x500?text=Your+Character" />

  <!-- CENTER TEXT -->
  <div class="center">
    <h1>IGRIS</h1>
    <p>Arise, become the best version of yourself.</p>
    <button class="btn">Download APK</button>
  </div>

  <!-- RIGHT CHARACTER -->
  <img class="character" src="https://via.placeholder.com/300x500?text=Opponent" />

</div>

</body>
</html>
