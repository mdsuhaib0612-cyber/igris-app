<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IGRIS</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: url('./bg.jpg') no-repeat center/cover;
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
}

/* CENTER TEXT */
.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  text-align: center;
}

h1 {
  color: white;
  font-size: 90px;
  text-shadow: 0 0 60px #00c6ff;
}

p {
  color: #ccc;
  font-size: 22px;
}

button {
  padding: 15px 35px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
  box-shadow: 0 0 25px #00c6ff;
}

/* CHARACTER CONTAINER */
.char-container {
  position: absolute;
  bottom: 0;
  width: 500px;
  height: 100%;
}

/* POSITION */
.blue-container { left: -80px; }
.red-container { right: -80px; }

/* IMAGE */
.character {
  width: 100%;
  mix-blend-mode: screen;
  position: relative;
  z-index: 3;
}

/* AURA LAYER */
.aura-layer {
  position: absolute;
  inset: 0;
  filter: blur(40px);
  z-index: 2;
}

/* BLUE AURA */
.blue-glow {
  background: radial-gradient(circle,
    rgba(0,198,255,0.9),
    rgba(0,198,255,0.4),
    transparent 70%);
  animation: auraUp 2s infinite linear;
}

/* RED AURA */
.red-glow {
  background: radial-gradient(circle,
    rgba(255,0,0,0.7),
    rgba(255,0,0,0.3),
    transparent 70%);
  animation: auraDown 2.5s infinite linear;
}

/* ANIMATIONS */
@keyframes auraUp {
  0% { transform: translateY(20px) scale(1); opacity: 0.7; }
  100% { transform: translateY(-80px) scale(1.3); opacity: 0; }
}

@keyframes auraDown {
  0% { transform: translateY(-10px) scale(1); opacity: 0.5; }
  100% { transform: translateY(40px) scale(0.9); opacity: 0; }
}

/* PARTICLES */
.particles {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: 4;
}

.particles span {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  animation: rise 3s linear infinite;
}

.blue-particles span {
  background: #00c6ff;
  box-shadow: 0 0 10px #00c6ff;
}

.red-particles span {
  background: red;
  box-shadow: 0 0 10px red;
}

@keyframes rise {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-200px); opacity: 0; }
}

/* ENERGY WAVE */
.energy-wave {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, transparent 60%, rgba(0,198,255,0.2));
  animation: wave 3s infinite;
}

@keyframes wave {
  0% { transform: scale(0.8); opacity: 0.3; }
  100% { transform: scale(1.5); opacity: 0; }
}

/* LIGHTNING */
.lightning {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(transparent, rgba(255,255,255,0.1), transparent);
  animation: flash 5s infinite;
}

@keyframes flash {
  0%, 92%, 100% { opacity: 0; }
  94% { opacity: 1; }
}

/* ROCKS */
.rock {
  position: absolute;
  width: 12px;
  height: 12px;
  background: #444;
  border-radius: 50%;
  animation: float 4s infinite ease-in-out;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-80px); }
  100% { transform: translateY(0); }
}

.r1 { left: 20%; bottom: 100px; }
.r2 { left: 30%; bottom: 150px; }
.r3 { right: 25%; bottom: 120px; }
.r4 { right: 35%; bottom: 180px; }

</style>
</head>

<body>

<div class="overlay"></div>

<div class="energy-wave"></div>
<div class="lightning"></div>

<div class="rock r1"></div>
<div class="rock r2"></div>
<div class="rock r3"></div>
<div class="rock r4"></div>

<!-- BLUE CHARACTER -->
<div class="char-container blue-container">
  <img src="./blue.png" class="character">
  <div class="aura-layer blue-glow"></div>
  <div class="particles blue-particles">
    <span style="left:10%"></span>
    <span style="left:30%"></span>
    <span style="left:50%"></span>
    <span style="left:70%"></span>
    <span style="left:90%"></span>
  </div>
</div>

<!-- RED CHARACTER -->
<div class="char-container red-container">
  <img src="./red.png" class="character">
  <div class="aura-layer red-glow"></div>
  <div class="particles red-particles">
    <span style="left:10%"></span>
    <span style="left:30%"></span>
    <span style="left:50%"></span>
    <span style="left:70%"></span>
    <span style="left:90%"></span>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <h1>IGRIS</h1>
  <p>Arise. Become the best version of yourself.</p>
  <button>Download APK</button>
</div>

</body>
</html>
