<!DOCTYPE html>
<html>
<head>
<title>IGRIS</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #000000, #01040f);
  overflow: hidden;
  color: white;
  font-family: Arial;
}

/* HERO */
.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 100vh;
  padding: 0 80px;
}

/* BLUE SIDE (DOMINANT) */
.blue {
  position: relative;
  width: 350px;
  height: 550px;
}

/* MASSIVE AURA */
.blue::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,150,255,0.9), transparent 70%);
  filter: blur(50px);
  animation: explode 1.5s infinite ease-in-out;
}

/* OUTER WAVE */
.blue::after {
  content: "";
  position: absolute;
  width: 700px;
  height: 700px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 2px solid rgba(0,150,255,0.2);
  animation: wave 2s infinite;
}

/* RED SIDE (WEAKENED) */
.red {
  position: relative;
  width: 300px;
  height: 500px;
  animation: pull 2s infinite ease-in-out;
}

/* SMALL AURA */
.red::before {
  content: "";
  position: absolute;
  width: 200px;
  height: 200px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,0,0,0.6), transparent 70%);
  filter: blur(30px);
}

/* GRAVITY PULL */
@keyframes pull {
  0% { transform: translateX(0); }
  50% { transform: translateX(-30px); }
  100% { transform: translateX(0); }
}

/* BLUE EXPLOSION */
@keyframes explode {
  0% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
  50% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
}

/* ENERGY WAVES */
@keyframes wave {
  0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
  100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
}

/* ENERGY FLOW LINE */
.energy-flow {
  position: absolute;
  top: 50%;
  left: 30%;
  width: 40%;
  height: 2px;
  background: linear-gradient(to right, #00c6ff, transparent);
  animation: flow 1s infinite;
}

@keyframes flow {
  0% { opacity: 0; transform: translateX(-20px); }
  50% { opacity: 1; }
  100% { opacity: 0; transform: translateX(20px); }
}

/* CENTER TEXT */
.center {
  text-align: center;
}

h1 {
  font-size: 70px;
  text-shadow: 0 0 50px #00c6ff;
}

p {
  opacity: 0.8;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 15px 35px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
  cursor: pointer;
  box-shadow: 0 0 30px #00c6ff;
}

.btn:hover {
  transform: scale(1.1);
}
</style>

</head>

<body>

<div class="energy-flow"></div>

<div class="hero">

  <!-- BLUE (DOMINANT) -->
  <div class="blue"></div>

  <!-- CENTER -->
  <div class="center">
    <h1>IGRIS</h1>
    <p>Arise, become the best version of yourself.</p>
    <button class="btn">Download APK</button>
  </div>

  <!-- RED (AFFECTED) -->
  <div class="red"></div>

</div>

</body>
</html>
