<!DOCTYPE html>
<html>
<head>
<title>IGRIS</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #000000, #020617);
  overflow: hidden;
  color: white;
  font-family: Arial, sans-serif;
}

/* HERO */
.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 100vh;
  padding: 0 80px;
}

/* AURA BASE */
.aura {
  width: 320px;
  height: 520px;
  position: relative;
}

/* 🔵 BLUE CORE (POWER SOURCE) */
.blue::before {
  content: "";
  position: absolute;
  width: 220px;
  height: 220px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, #00c6ff, rgba(0,150,255,0.6), transparent 70%);
  border-radius: 50%;
  filter: blur(35px);
}

/* 🔵 CHAOTIC AURA LAYERS */
.blue::after {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,150,255,0.7), transparent 40%),
    radial-gradient(circle at 80% 40%, rgba(0,150,255,0.6), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(0,150,255,0.5), transparent 50%);
  filter: blur(40px);
  animation: chaos 2s infinite linear;
}

/* 🔴 RED (WEAK / COMPRESSED) */
.red::before {
  content: "";
  position: absolute;
  width: 160px;
  height: 160px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, #ff3b3b, rgba(255,0,0,0.4), transparent 70%);
  border-radius: 50%;
  filter: blur(25px);
}

/* RED SLIGHT INSTABILITY */
.red {
  animation: shake 0.4s infinite;
}

/* CHAOTIC ENERGY MOVEMENT */
@keyframes chaos {
  0%   { transform: translate(0px, 0px) scale(1); }
  25%  { transform: translate(10px, -15px) scale(1.05); }
  50%  { transform: translate(-15px, 10px) scale(1.1); }
  75%  { transform: translate(5px, -10px) scale(1.05); }
  100% { transform: translate(0px, 0px) scale(1); }
}

/* RED SHAKE (PRESSURE) */
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-2px); }
  50% { transform: translateX(2px); }
  75% { transform: translateX(-2px); }
  100% { transform: translateX(0); }
}

/* CENTER */
.center {
  text-align: center;
}

h1 {
  font-size: 70px;
  letter-spacing: 4px;
  text-shadow: 0 0 50px #00c6ff;
}

p {
  font-size: 18px;
  opacity: 0.8;
}

/* BUTTON */
.btn {
  margin-top: 25px;
  padding: 15px 35px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
  cursor: pointer;
  box-shadow: 0 0 30px #00c6ff;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* BACKGROUND ENERGY */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,150,255,0.08) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: move 25s linear infinite;
}

@keyframes move {
  from { transform: translate(0,0); }
  to { transform: translate(-150px,-150px); }
}
</style>

</head>

<body>

<div class="hero">

  <!-- 🔵 DOMINANT ENERGY -->
  <div class="aura blue"></div>

  <!-- CENTER -->
  <div class="center">
    <h1>IGRIS</h1>
    <p>Arise, become the best version of yourself.</p>
    <button class="btn">Download APK</button>
  </div>

  <!-- 🔴 SUPPRESSED ENERGY -->
  <div class="aura red"></div>

</div>

</body>
</html>
