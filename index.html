<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGRIS - Arise</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #000;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 40px;
  position: relative;
}

/* TEXT CENTER */
.center {
  text-align: center;
  max-width: 500px;
}

.center h1 {
  font-size: 70px;
  text-shadow: 0 0 25px cyan;
}

.center p {
  margin: 20px 0;
  color: #ccc;
}

/* BUTTON */
button {
  padding: 15px 35px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(to right, #00c6ff, #0072ff);
  color: white;
  cursor: pointer;
  box-shadow: 0 0 20px #00c6ff;
}

/* DISABLED BUTTON */
.disabled {
  background: gray;
  cursor: not-allowed;
  box-shadow: none;
}

/* CHARACTERS */
.character {
  width: 30%;
}

.character img {
  width: 100%;
}

/* FEATURES */
.features {
  padding: 60px 20px;
  text-align: center;
}

.features h2 {
  font-size: 40px;
  margin-bottom: 40px;
}

.feature-grid {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.feature {
  width: 250px;
  padding: 20px;
  border-radius: 15px;
  background: #111;
  box-shadow: 0 0 20px rgba(0,198,255,0.2);
}

/* COMING SOON */
.coming {
  text-align: center;
  padding: 60px 20px;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

  <div class="character">
    <img src="blue.png">
  </div>

  <div class="center">
    <h1>IGRIS</h1>
    <p>Arise. Become the best version of yourself.</p>

    <button class="disabled">APK Coming Soon</button>

    <p style="margin-top:10px; font-size:14px;">
      🚀 Launching soon — stay tuned
    </p>
  </div>

  <div class="character">
    <img src="red.png">
  </div>

</div>

<!-- FEATURES -->
<div class="features">
  <h2>What is IGRIS?</h2>

  <div class="feature-grid">
    <div class="feature">🏋️ Track Workouts</div>
    <div class="feature">💧 Water Tracker</div>
    <div class="feature">📊 Progress System</div>
    <div class="feature">🎮 Level Up System</div>
  </div>
</div>

<!-- COMING SOON / EMAIL -->
<div class="coming">
  <h2>Be the First to Experience IGRIS</h2>
  <p>Enter your email to get notified at launch</p>

  <input type="email" placeholder="Enter your email">
  <br><br>
  <button>Notify Me</button>
</div>

</body>
</html>
