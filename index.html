<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGRIS</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #020617;
  color: white;
  overflow-x: hidden;
}

/* BACKGROUND */
.app-bg {
  position: fixed;
  inset: 0;
  z-index: 0;

  display: flex;
  flex-direction: column;
  gap: 20px;
  padding: 40px;

  opacity: 0.7;
}

.card {
  background: linear-gradient(135deg, #0ea5e9, #020617);
  border-radius: 15px;
  padding: 20px;
}

.row {
  display: flex;
  gap: 20px;
}

.small { width: 30%; }
.medium { width: 50%; }
.large { width: 100%; }

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(2,6,23,0.25);
  z-index: 1;
}

/* HERO */
.hero {
  position: relative;
  z-index: 2;
  height: 100vh;
}

/* CHARACTERS */
.character {
  position: absolute;
  bottom: 0;
}

.left { left: 0; }
.right { right: 0; }

.character img {
  height: 95vh;
  max-height: 100vh;
  object-fit: contain;
}

/* CENTER TEXT */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.center h1 {
  font-size: 80px;
  text-shadow: 0 0 30px #00c6ff;
}

.center p {
  margin: 20px 0;
  color: #ccc;
}

/* BUTTON */
button {
  padding: 15px 35px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(to right, #00c6ff, #0072ff);
  color: white;
  cursor: pointer;
}

.disabled {
  background: #444;
}

/* FEATURES */
.features {
  position: relative;
  z-index: 2;
  padding: 80px 20px;
  text-align: center;
}

.features h2 {
  font-size: 40px;
  margin-bottom: 40px;
}

.feature-grid {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.feature {
  width: 220px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(0,0,0,0.5);
}

/* COMING */
.coming {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 60px 20px;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: none;
}

/* 📱 MOBILE FIX */
@media (max-width: 768px) {

  .hero {
    height: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  .character {
    position: relative;
    margin: 10px 0;
  }

  .character img {
    height: 40vh;
  }

  .center {
    position: relative;
    transform: none;
    top: auto;
    left: auto;
    margin: 20px 0;
  }

  .center h1 {
    font-size: 45px;
  }

  .center p {
    font-size: 14px;
  }

  .feature-grid {
    flex-direction: column;
    align-items: center;
  }

  .feature {
    width: 90%;
  }
}

/* 📱 PORTRAIT FIX */
@media (max-width: 768px) and (orientation: portrait) {

  .hero {
    justify-content: center;
    gap: 10px;
    padding: 20px 10px;
  }

  .character img {
    height: 28vh;
  }

  .center {
    margin: 10px 0;
  }

  .center h1 {
    font-size: 36px;
  }

  .center p {
    font-size: 13px;
  }

}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="app-bg">
  <div class="card large">🔥 Workout Streak: 3 Days</div>

  <div class="row">
    <div class="card medium">💧 Water Intake: 60%</div>
    <div class="card small">📊 Calories: 1800 kcal</div>
  </div>

  <div class="card large">🏋️ Today's Workout Plan</div>

  <div class="row">
    <div class="card medium">🥗 Diet Plan</div>
    <div class="card small">👤 Level: Beginner</div>
  </div>
</div>

<div class="overlay"></div>

<!-- HERO -->
<div class="hero">

  <div class="character left">
    <img src="blue.png">
  </div>

  <div class="center">
    <h1>IGRIS</h1>
    <p>Arise. Become the best version of yourself.</p>
    <button onclick="alert('Coming soon 🚀')">Notify Me</button>
  </div>

  <div class="character right">
    <img src="red.png">
  </div>

</div>

<!-- FEATURES -->
<div class="features">
  <h2>What is IGRIS?</h2>

  <div class="feature-grid">
    <div class="feature">🏋️ Track Workouts</div>
    <div class="feature">💧 Water Tracker</div>
    <div class="feature">📊 Progress System</div>
    <div class="feature">🎮 Level System</div>
  </div>
</div>

<!-- EMAIL -->
<div class="coming">
  <h2>Be the First</h2>
  <p>Get notified when we launch</p>
</div>

</body>
</html>
