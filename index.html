<!DOCTYPE html>
<html>
<head>
<title>IGRIS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #000000, #050a1a);
  color: white;
  overflow: hidden;
}

/* HERO */
.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100vh;
  padding: 0 60px;
}

/* AURA BASE */
.aura {
  width: 280px;
  height: 500px;
  border-radius: 20px;
  position: relative;
}

/* BLUE AURA (PLAYER) */
.blue {
  background: rgba(0, 150, 255, 0.05);
  box-shadow: 0 0 40px rgba(0,150,255,0.4);
}

.blue::before {
  content: "";
  position: absolute;
  width: 120%;
  height: 120%;
  top: -10%;
  left: -10%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,150,255,0.6), transparent 70%);
  animation: pulseBlue 2s infinite;
}

/* RED AURA (ENEMY) */
.red {
  background: rgba(255, 0, 0, 0.05);
  box-shadow: 0 0 40px rgba(255,0,0,0.4);
}

.red::before {
  content: "";
  position: absolute;
  width: 120%;
  height: 120%;
  top: -10%;
  left: -10%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,0,0,0.6), transparent 70%);
  animation: pulseRed 2s infinite;
}

/* PULSE ANIMATION */
@keyframes pulseBlue {
  0% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); opacity: 0.6; }
}

@keyframes pulseRed {
  0% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); opacity: 0.6; }
}

/* CENTER */
.center {
  text-align: center;
}

h1 {
  font-size: 70px;
  letter-spacing: 4px;
  text-shadow: 0 0 25px rgba(0,150,255,1);
}

p {
  font-size: 18px;
  opacity: 0.8;
}

/* BUTTON */
.btn {
  margin-top: 25px;
  padding: 15px 35px;
  border: none;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
  font-size: 16px;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 25px rgba(0,150,255,0.8);
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px rgba(0,150,255,1);
}

/* ENERGY PARTICLES */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: move 20s linear infinite;
}

@keyframes move {
  from { transform: translate(0,0); }
  to { transform: translate(-100px,-100px); }
}
</style>

</head>

<body>

<div class="hero">

  <!-- PLAYER AURA -->
  <div class="aura blue"></div>

  <!-- CENTER TEXT -->
  <div class="center">
    <h1>IGRIS</h1>
    <p>Arise, become the best version of yourself.</p>
    <button class="btn">Download APK</button>
  </div>

  <!-- ENEMY AURA -->
  <div class="aura red"></div>

</div>

</body>
</html>
