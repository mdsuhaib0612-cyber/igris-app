<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGRIS</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #020617;
  color: white;
  overflow-x: hidden;
}

/* 🔥 BACKGROUND (UNCHANGED) */
.app-bg {
  position: fixed;
  inset: 0;
  z-index: 1;

  display: flex;
  flex-direction: column;
  gap: 20px;
  padding: 40px;

  opacity: 0.75;
  filter: blur(1px);
}

.card {
  background: linear-gradient(135deg, #0ea5e9, #020617);
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 0 20px rgba(0,198,255,0.3);
}

.row {
  display: flex;
  gap: 20px;
}

.small { width: 30%; }
.medium { width: 50%; }
.large { width: 100%; }

/* 🔥 OVERLAY (UNCHANGED) */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(2,6,23,0.3);
  z-index: 2;
}
