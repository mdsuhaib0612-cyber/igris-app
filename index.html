<!DOCTYPE html>
<html>
<head>
<title>IGRIS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #0a0f1c, #000000);
  color: white;
  overflow: hidden;
}

/* HERO SECTION */
.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100vh;
  padding: 0 60px;
}

/* SIDE GLOW (for characters later) */
.side {
  width: 300px;
  height: 500px;
  border-radius: 20px;
  background: rgba(255,255,255,0.03);
  box-shadow: 0 0 40px rgba(0, 150, 255, 0.2);
}

/* CENTER TEXT */
.center {
  text-align: center;
}

h1 {
  font-size: 70px;
  letter-spacing: 4px;
  text-shadow: 0 0 20px rgba(0,150,255,0.8);
}

p {
  font-size: 18px;
  opacity: 0.8;
}

/* BUTTON */
.btn {
  margin-top: 25px;
  padding: 15px 35px;
  border: none;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
  font-size: 16px;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 20px rgba(0,150,255,0.6);
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(0,150,255,1);
}

/* PARTICLES BACKGROUND EFFECT */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,150,255,0.1) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: move 20s linear infinite;
}

@keyframes move {
  from { transform: translate(0,0); }
  to { transform: translate(-100px,-100px); }
}
</style>

</head>

<body>

<div class="hero">

  <!-- LEFT SIDE (YOUR CHARACTER SPACE) -->
  <div class="side"></div>

  <!-- CENTER -->
  <div class="center">
    <h1>IGRIS</h1>
    <p>Arise, become the best version of yourself.</p>
    <button class="btn">Download APK</button>
  </div>

  <!-- RIGHT SIDE (ENEMY SPACE) -->
  <div class="side" style="box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);"></div>

</div>

</body>
</html>
