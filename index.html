<style>

/* BLUE AURA (RISING POWER) */
.blue::before {
  content: "";
  position: absolute;
  width: 300px;
  height: 600px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(
    to top,
    rgba(0,150,255,0.9),
    rgba(0,150,255,0.4),
    transparent
  );
  filter: blur(30px);
  animation: riseEnergy 1.2s linear infinite;
}

/* RED AURA (PRESSURE DOWN) */
.red::before {
  content: "";
  position: absolute;
  width: 250px;
  height: 600px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(
    to bottom,
    rgba(255,0,0,0.8),
    rgba(255,0,0,0.3),
    transparent
  );
  filter: blur(30px);
  animation: fallEnergy 1.2s linear infinite;
}

/* UPWARD FLOW */
@keyframes riseEnergy {
  0% {
    transform: translate(-50%, 40px);
    opacity: 0.6;
  }
  100% {
    transform: translate(-50%, -40px);
    opacity: 1;
  }
}

/* DOWNWARD PRESSURE */
@keyframes fallEnergy {
  0% {
    transform: translate(-50%, -40px);
    opacity: 0.6;
  }
  100% {
    transform: translate(-50%, 40px);
    opacity: 1;
  }
}

</style>
