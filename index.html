<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IGRIS</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #0f2027, #000000 80%);
    overflow: hidden;
}

/* BACKGROUND ENERGY FOG */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,150,255,0.15), transparent 40%),
                radial-gradient(circle, rgba(255,0,0,0.15), transparent 40%);
    animation: bgFlow 20s linear infinite;
}

@keyframes bgFlow {
    0% { transform: translate(0,0); }
    100% { transform: translate(-20%, -20%); }
}

/* MAIN CONTAINER */
.container {
    display: flex;
    height: 100vh;
    align-items: center;
    justify-content: space-between;
    position: relative;
    padding: 0 40px;
}

/* CHARACTER BASE */
.character {
    position: relative;
    width: 32%;
}

/* IMAGE */
.character img {
    width: 100%;
    position: relative;
    z-index: 2;
}

/* BLUE AURA */
.blue::before {
    content: "";
    position: absolute;
    inset: -40px;
    background: radial-gradient(circle, rgba(0,180,255,0.6), transparent 60%);
    filter: blur(50px);
    animation: auraUp 2.5s linear infinite;
    z-index: 1;
}

/* RED AURA */
.red::before {
    content: "";
    position: absolute;
    inset: -40px;
    background: radial-gradient(circle, rgba(255,0,0,0.6), transparent 60%);
    filter: blur(50px);
    animation: auraDown 2.5s linear infinite;
    z-index: 1;
}

/* AURA MOVEMENT */
@keyframes auraUp {
    0% { transform: translateY(0px) scale(1); }
    100% { transform: translateY(-25px) scale(1.1); }
}

@keyframes auraDown {
    0% { transform: translateY(0px) scale(1); }
    100% { transform: translateY(25px) scale(1.1); }
}

/* FLOATING PARTICLES */
.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    opacity: 0.7;
}

.blue-particle {
    background: #00ccff;
    box-shadow: 0 0 10px #00ccff;
    animation: floatUp 3s linear infinite;
}

.red-particle {
    background: red;
    box-shadow: 0 0 10px red;
    animation: floatDown 3s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-200px); opacity: 0; }
}

@keyframes floatDown {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(200px); opacity: 0; }
}

/* FLOATING ROCKS */
.rock {
    position: absolute;
    width: 20px;
    height: 20px;
    background: #222;
    border-radius: 4px;
    animation: floatRock 4s ease-in-out infinite;
}

@keyframes floatRock {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
}

/* CENTER TEXT */
.center {
    text-align: center;
    color: white;
}

.center h1 {
    font-size: 80px;
    letter-spacing: 5px;
    text-shadow: 0 0 25px cyan;
}

.center p {
    margin: 20px 0;
    font-size: 20px;
    color: #ccc;
}

/* BUTTON */
button {
    padding: 15px 40px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 0 20px #00c6ff;
}

</style>
</head>

<body>

<div class="container">

    <!-- LEFT BLUE CHARACTER -->
    <div class="character blue">
        <img src="blue.png">

        <!-- PARTICLES -->
        <div class="particle blue-particle" style="left:30%; top:80%;"></div>
        <div class="particle blue-particle" style="left:60%; top:90%;"></div>

        <!-- ROCKS -->
        <div class="rock" style="left:20%; top:70%;"></div>
        <div class="rock" style="left:70%; top:60%;"></div>
    </div>

    <!-- CENTER TEXT -->
    <div class="center">
        <h1>IGRIS</h1>
        <p>Arise. Become the best version of yourself.</p>
        <button>Download APK</button>
    </div>

    <!-- RIGHT RED CHARACTER -->
    <div class="character red">
        <img src="red.png">

        <!-- PARTICLES -->
        <div class="particle red-particle" style="left:40%; top:10%;"></div>
        <div class="particle red-particle" style="left:70%; top:20%;"></div>

        <!-- ROCKS -->
        <div class="rock" style="left:30%; top:20%;"></div>
        <div class="rock" style="left:60%; top:30%;"></div>
    </div>

</div>

</body>
</html>
