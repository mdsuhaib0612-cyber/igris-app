<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGRIS</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #020617;
  color: white;
}

/* 🔥 BACKGROUND LAYER (VISIBLE NOW) */
.app-bg {
  position: fixed;
  inset: 0;
  z-index: 1; /* 🔥 IMPORTANT */

  display: flex;
  flex-direction: column;
  gap: 20px;
  padding: 40px;

  opacity: 0.45;
}

/* CARDS */
.card {
  background: linear-gradient(135deg, #0ea5e9, #020617);
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 0 20px rgba(0,198,255,0.3);
}

.row {
  display: flex;
  gap: 20px;
}

.small { width: 30%; }
.medium { width: 50%; }
.large { width: 100%; }

/* 🔥 SOFT OVERLAY (NOT BLACK) */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(2,6,23,0.6); /* OG color */
  z-index: 2;
}

/* HERO */
.hero {
  position: relative;
  z-index: 3;

  height: 100vh;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
}

/* CENTER TEXT */
.center {
  text-align: center;
}

.center h1 {
  font-size: 70px;
  text-shadow: 0 0 25px #00c6ff;
}

.center p {
  margin: 20px 0;
  color: #aaa;
}

/* BUTTON */
button {
  padding: 14px 30px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(to right, #00c6ff, #0072ff);
  color: white;
}

.disabled {
  background: #444;
}

/* 🔥 CHARACTER FIX (PERFECT CENTER ALIGN) */
.character {
  display: flex;
  justify-content: center;
}

.character img {
  width: 280px;
}

/* LEFT */
.left {
  justify-content: flex-start;
  padding-left: 40px;
}

/* RIGHT */
.right {
  justify-content: flex-end;
  padding-right: 40px;
}

/* FEATURES */
.features {
  position: relative;
  z-index: 3;
  padding: 60px 20px;
  text-align: center;
}

.feature-grid {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.feature {
  width: 220px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(0,0,0,0.5);
}

/* COMING */
.coming {
  position: relative;
  z-index: 3;
  text-align: center;
  padding: 60px 20px;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: none;
}

</style>
</head>

<body>

<!-- 🔥 BACKGROUND -->
<div class="app-bg">
  <div class="card large">🔥 Workout Streak: 3 Days</div>

  <div class="row">
    <div class="card medium">💧 Water Intake: 60%</div>
    <div class="card small">📊 Calories: 1800 kcal</div>
  </div>

  <div class="card large">🏋️ Today's Workout Plan</div>

  <div class="row">
    <div class="card medium">🥗 Diet Plan</div>
    <div class="card small">👤 Level: Beginner</div>
  </div>
</div>

<div class="overlay"></div>

<!-- HERO -->
<div class="hero">

  <div class="character left">
    <img src="blue.png">
  </div>

  <div class="center">
    <h1>IGRIS</h1>
    <p>Arise. Become the best version of yourself.</p>

    <button class="disabled">APK Coming Soon</button>
  </div>

  <div class="character right">
    <img src="red.png">
  </div>

</div>

<!-- FEATURES -->
<div class="features">
  <h2>What is IGRIS?</h2>

  <div class="feature-grid">
    <div class="feature">🏋️ Track Workouts</div>
    <div class="feature">💧 Water Tracker</div>
    <div class="feature">📊 Progress System</div>
    <div class="feature">🎮 Level System</div>
  </div>
</div>

<!-- EMAIL -->
<div class="coming">
  <h2>Be the First</h2>
  <p>Get notified when we launch</p>

  <input type="email" placeholder="Enter your email">
  <br><br>
  <button>Notify Me</button>
</div>

</body>
</html>
